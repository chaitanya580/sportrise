<!DOCTYPE html>
<html>
<head>
  <base href="/demo/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SportRise — India's First Student Athlete Discovery Platform. Find coaches, compete in tournaments, earn XP, and get discovered by national scouts.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts preconnect for faster font loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- iOS / PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SportRise">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SportRise</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Prevent white flash before Flutter renders its dark canvas */
    html, body {
      background-color: #0D1B2A;
      margin: 0;
      padding: 0;
      height: 100%;
    }
  </style>
</head>
<body>
  <!-- Stub for the passkeys plugin (transitive dep of supabase_flutter 2.15+).
       Without a PasskeyAuthenticator global, the web plugin throws during
       registration and the whole app renders a blank screen. SportRise does
       not use passkey login, so a no-op stub is sufficient. -->
  <script>
    window.PasskeyAuthenticator = window.PasskeyAuthenticator || {
      init: function () {},
      isSupported: function () { return Promise.resolve(false); },
      register: function () { return Promise.reject(new Error('Passkeys not enabled')); },
      authenticate: function () { return Promise.reject(new Error('Passkeys not enabled')); }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
